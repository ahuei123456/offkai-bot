services:
  discord-offkai-bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    container_name: discord-offkai-bot
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GUILDS=${GUILDS}
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_KEY=${ADMIN_KEY}
    restart: unless-stopped
